server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/user_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          # same secret used by auth-service JWT signing
          secret-key: CHANGE_THIS_TO_A_VERY_LONG_SECRET_KEY_1234567890

management:
  endpoints:
    web:
      exposure:
        include: health,info