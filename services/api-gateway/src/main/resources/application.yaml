server:
  port: 8082

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Route Auth Service
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
        # /me reserive in auth service
        - id: auth-service-me
          uri: http://localhost:8081
          predicates:
            - Path=/me/**

        # router services route can be added here in the future

      # (Optional) good defaults
      default-filters:
        # Remove duplicated headers issues in some setups
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

management:
  endpoints:
    web:
      exposure:
        include: health,info

# must be the same as in auth-service for JWT validation
auth:
  jwt:
    issuer: mockbridge-auth
    secret: CHANGE_THIS_TO_A_VERY_LONG_SECRET_KEY_1234567890