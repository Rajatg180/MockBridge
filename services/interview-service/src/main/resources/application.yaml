server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/interview_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: localhost:9094

management:
  endpoints:
    web:
      exposure:
        include: health,info