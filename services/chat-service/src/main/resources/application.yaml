server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/chat_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

services:
  interview:
    base-url: http://localhost:8084